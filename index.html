<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMP CORE - ログイン</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="login-bg">
  <div class="login-card">

    <div class="login-logo">LUMP<span>CORE</span></div>
    <div class="login-sub">モバイル事業 実績管理システム</div>

    <div class="login-error" id="loginError"></div>

    <div class="form-group">
      <label class="form-label">ユーザー名</label>
      <select class="form-select" id="loginUser">
        <option value="">-- ユーザーを選択してください --</option>
      </select>
    </div>

    <div class="form-group" style="margin-top:16px">
      <label class="form-label">パスワード</label>
      <input type="password" class="form-input" id="loginPw"
        placeholder="パスワードを入力"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="btn btn-primary"
      style="width:100%;margin-top:24px;padding:12px;font-size:15px;justify-content:center"
      onclick="doLogin()">
      ログイン
    </button>

    <div class="login-hint">
      初回ログインパスワード: <strong>lamp1234</strong>
    </div>

  </div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>

  // すでにログイン済みならアプリへ
  initData();
  if (getSession()) {
    location.href = 'app.html';
  }

  // ユーザー一覧をドロップダウンに追加
  (function populateUsers() {
    const users = getUsers();
    const sel = document.getElementById('loginUser');
    // 役職レベル順（強い順）にソート
    const sorted = [...users].sort((a, b) =>
      (ROLES[b.role]?.level || 0) - (ROLES[a.role]?.level || 0)
    );
    sorted.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = `${u.name}　（${ROLES[u.role]?.label || u.role}）`;
      sel.appendChild(opt);
    });
  })();

  function doLogin() {
    const userId = document.getElementById('loginUser').value;
    const pw     = document.getElementById('loginPw').value;

    if (!userId) { showError('ユーザーを選択してください'); return; }
    if (!pw)     { showError('パスワードを入力してください'); return; }

    const result = login(userId, pw);
    if (result.ok) {
      location.href = 'app.html';
    } else {
      showError(result.error);
    }
  }

  function showError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
  }

</script>
</body>
</html>
